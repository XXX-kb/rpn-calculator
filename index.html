  <pre><code>linux：</code></pre>
<pre><code>g++ rpn_calc.cpp -o rpn_calc</code></pre>


<h2>基本使用示例</h2>
<pre>输入: 5 2 +
结果: 7

输入: 3 4 * 2 /
结果: 6

输入: 5 5 + ;10 2 /
输出:
批量计算 2 个表达式:
1. 5 5 + = 10.000000
2. 10 2 / = 5.000000</pre>

<h2>支持的操作</h2>
<ul>
<li>加法: <code>+</code></li>
<li>减法: <code>-</code></li>
<li>乘法: <code>*</code></li>
<li>除法: <code>/</code></li>
</ul>
